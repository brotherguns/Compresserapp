name: Build Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build liblzma for iOS arm64
        run: |
          git clone --depth 1 --branch v5.6.3 https://github.com/tukaani-project/xz.git xz-src
          cd xz-src
          autoreconf -fi
          IOS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          ./configure \
            --host=aarch64-apple-ios \
            --prefix="$(pwd)/install-ios" \
            CC="$(xcrun -f clang)" \
            CFLAGS="-arch arm64 -isysroot $IOS_SDK -mios-version-min=16.0 -O2" \
            --disable-shared \
            --enable-static \
            --disable-nls \
            --disable-doc \
            --disable-xz \
            --disable-xzdec \
            --disable-lzmadec \
            --disable-lzmainfo \
            --disable-scripts \
            --disable-tests
          make -j$(sysctl -n hw.logicalcpu)
          make install
          mkdir -p ../liblzma-ios/lib ../liblzma-ios/include
          cp install-ios/lib/liblzma.a ../liblzma-ios/lib/
          cp -r install-ios/include/lzma.h install-ios/include/lzma ../liblzma-ios/include/
          echo "liblzma built OK"
          ls -lh ../liblzma-ios/lib/

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild \
            -project TarXZCompressor.xcodeproj \
            -scheme TarXZCompressor \
            -resolvePackageDependencies \
            -clonedSourcePackagesDirPath .spm-cache

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project TarXZCompressor.xcodeproj \
            -scheme TarXZCompressor \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -clonedSourcePackagesDirPath .spm-cache \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            CONFIGURATION_BUILD_DIR="$(pwd)/build/Release-iphoneos" \
            build

          BINARY="build/Release-iphoneos/TarXZCompressor.app/TarXZCompressor"
          if [ ! -f "$BINARY" ]; then
            echo "Build failed: executable not found at $BINARY"
            exit 1
          fi
          echo "Binary OK: $(ls -lh $BINARY)"

      - name: Package IPA
        run: |
          mkdir -p build/Payload
          cp -r build/Release-iphoneos/TarXZCompressor.app build/Payload/
          cd build
          zip -r TarXZCompressor-unsigned.ipa Payload/
          echo "IPA size: $(du -sh TarXZCompressor-unsigned.ipa | cut -f1)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TarXZCompressor-unsigned
          path: build/TarXZCompressor-unsigned.ipa
          retention-days: 30
