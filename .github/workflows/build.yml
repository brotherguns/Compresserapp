name: Build Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild \
            -project TarXZCompressor.xcodeproj \
            -scheme TarXZCompressor \
            -resolvePackageDependencies \
            -clonedSourcePackagesDirPath .spm-cache

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project TarXZCompressor.xcodeproj \
            -scheme TarXZCompressor \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -clonedSourcePackagesDirPath .spm-cache \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            CONFIGURATION_BUILD_DIR="$(pwd)/build/Release-iphoneos" \
            build

          BINARY="build/Release-iphoneos/TarXZCompressor.app/TarXZCompressor"
          if [ ! -f "$BINARY" ]; then
            echo "Build failed: executable not found at $BINARY"
            exit 1
          fi
          echo "Binary OK: $(ls -lh $BINARY)"

      - name: Package IPA
        run: |
          mkdir -p build/Payload
          cp -r build/Release-iphoneos/TarXZCompressor.app build/Payload/
          cd build
          zip -r TarXZCompressor-unsigned.ipa Payload/
          echo "IPA size: $(du -sh TarXZCompressor-unsigned.ipa | cut -f1)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TarXZCompressor-unsigned
          path: build/TarXZCompressor-unsigned.ipa
          retention-days: 30
