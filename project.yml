name: TarXZCompressor
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16"

packages:
  SWCompression:
    url: https://github.com/tsolomko/SWCompression
    from: "4.8.0"

targets:
  TarXZCompressor:
    type: application
    platform: iOS

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.TarXZCompressor
        INFOPLIST_FILE: TarXZCompressor/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: TarXZCompressor/Bridge/TarXZCompressor-Bridging-Header.h
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        ENABLE_BITCODE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_IDENTITY: ""
        DEVELOPMENT_TEAM: ""
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/liblzma-ios/include"
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/liblzma-ios/lib"
        OTHER_LDFLAGS:
          - "-llzma"

    dependencies:
      - package: SWCompression

    sources:
      - path: TarXZCompressor/TarXZCompressorApp.swift
      - path: TarXZCompressor/ContentView.swift
      - path: TarXZCompressor/CompressionManager.swift
      - path: TarXZCompressor/Assets.xcassets
      - path: TarXZCompressor/Info.plist
        buildPhase: none
      - path: TarXZCompressor/TarXZCompressor.entitlements
        buildPhase: none
      - path: TarXZCompressor/Bridge
